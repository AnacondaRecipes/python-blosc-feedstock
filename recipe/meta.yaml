{% set name = "blosc" %}
{% set version = "1.11.3" %}

package:
  name: python-{{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 89ed658eba7814a92e89c44d8c524148d55921595bc133bd1a90f8888a9e088e
  patches:  # [unix]
    - numpy-usage.patch  # [unix]

build:
  number: 0
  skip: True  # [py<310]
  script:
    - export USE_SYSTEM_BLOSC=1    # [unix]
    - set USE_SYSTEM_BLOSC=1       # [win]
    - {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  build:
    - {{ stdlib('c') }}
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - cmake >=3.14.0
    - make  # [unix]
    - ninja-base
  host:
    - pip
    - python
    - blosc
    - numpy >=1.16
    - setuptools
    - scikit-build >=0.11.1
    - py-cpuinfo
  run:
    - blosc
    - python

test:
  imports:
    - blosc
  requires:
    - pip
    - numpy
    - psutil
  commands:
    - pip check
    # Skipped tests on Windows due to code misalignment on CI for no reason (patch is not applying)
    - python -m blosc.test  # [not win]

about:
  home: http://python-blosc.blosc.org
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE.txt
  summary: A Python wrapper for the extremely fast Blosc compression library
  description: |
    Blosc is a high performance compressor optimized for binary data. 
    It has been designed to transmit data to the processor cache faster 
    than the traditional, non-compressed, direct memory fetch approach via a memcpy() OS call.
  dev_url: https://github.com/Blosc/python-blosc
  doc_url: http://python-blosc.blosc.org

extra:
  recipe-maintainers:
    - danielfrg
    - FrancescElies
    - msarahan
